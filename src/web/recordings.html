<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage RetroCapture recordings">
    <meta name="theme-color" content="#0A7A83">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title data-i18n="web.recordings.title">Recordings - RetroCapture</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="/vendor/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (vendored locally) -->
    <link rel="stylesheet" href="/vendor/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/style.css">
    <!-- i18n loader: must run before body renders so the
         'i18n-loading' class is set in time to hide the raw English
         literals while translations are fetched. -->
    <script src="/i18n.js"></script>

    <style>
        .recordings-container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .recording-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .recording-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        
        .video-player-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        .video-player-container.active {
            display: flex;
        }
        
        .video-player-wrapper {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }
        
        .video-player-wrapper video {
            max-width: 100%;
            max-height: 100%;
        }
        
        .close-player {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: none;
            border: none;
        }
        
        .recording-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .recording-thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        
        .recording-thumbnail-placeholder {
            width: 100%;
            height: 200px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        
        /* Garantir que o texto nos cards de gravação seja visível */
        .recording-card .card-body {
            color: var(--text-primary);
        }
        
        .recording-card .text-muted {
            color: var(--text-secondary) !important;
        }
        
        .recording-card .card-title {
            color: var(--text-primary) !important;
        }
        
        .recording-card .card-footer {
            color: var(--text-secondary) !important;
        }
    </style>
</head>
<body>
    <!-- Top navigation (shared across pages) -->
    <header class="portal-nav">
        <div class="container-fluid px-3 px-md-4">
            <div class="d-flex align-items-center justify-content-between">
                <a href="/" class="portal-brand text-decoration-none d-flex align-items-center">
                    <i class="bi bi-controller fs-3 me-2"></i>
                    <span class="fw-semibold" data-i18n="web.nav.brand">RetroCapture</span>
                </a>
                <nav class="portal-nav-links d-flex">
                    <a href="/" class="portal-nav-link"><i class="bi bi-broadcast me-1"></i><span class="d-none d-sm-inline" data-i18n="web.nav.live">Live</span></a>
                    <a href="/recordings.html" class="portal-nav-link active"><i class="bi bi-camera-video me-1"></i><span class="d-none d-sm-inline" data-i18n="web.nav.recordings">Recordings</span></a>
                    <a href="/config.html" class="portal-nav-link"><i class="bi bi-gear me-1"></i><span class="d-none d-sm-inline" data-i18n="web.nav.configuration">Configuration</span></a>
                </nav>
                <div class="d-flex align-items-center gap-1">
                    <select id="langSelect" class="form-select form-select-sm bg-dark text-light border-secondary" style="width: auto;" data-i18n-attr="aria-label:web.lang.label">
                        <option value="en" data-i18n="web.lang.en">English</option>
                        <option value="pt" data-i18n="web.lang.pt">Português (Brasil)</option>
                    </select>
                    <button class="btn btn-sm btn-outline-light" onclick="refreshRecordings()" data-i18n-title="web.nav.refresh_list" title="Refresh list">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Alert Container -->
    <div class="alert-container" id="alertContainer"></div>

    <!-- Main Content -->
    <main class="portal-main">
        <div class="container-fluid px-4 py-4">
            <div class="recordings-container">
                <!-- Search Bar -->
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="row g-3 align-items-center">
                            <div class="col-md-6">
                                <label for="searchInput" class="form-label" data-i18n="web.recordings.search_label">Search:</label>
                                <input type="text" class="form-control" id="searchInput" data-i18n-placeholder="web.recordings.search_hint" placeholder="Search by filename..." onkeyup="filterRecordings()">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">&nbsp;</label>
                                <div>
                                    <button class="btn btn-primary" onclick="refreshRecordings()">
                                        <i class="bi bi-arrow-clockwise"></i> <span data-i18n="web.recordings.refresh">Refresh</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recordings List -->
                <div id="recordingsList" class="row g-4">
                    <div class="col-12">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden" data-i18n="web.recordings.loading_sr">Loading...</span>
                            </div>
                            <p class="mt-3" data-i18n="web.recordings.loading">Loading recordings...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Video Player Modal -->
    <div class="video-player-container" id="videoPlayerContainer">
        <div class="video-player-wrapper">
            <button class="close-player" onclick="closeVideoPlayer()">
                <i class="bi bi-x-circle"></i>
            </button>
            <video id="videoPlayer" controls>
                <span data-i18n="web.recordings.video_unsupported">Your browser does not support video playback.</span>
            </video>
        </div>
    </div>

    <!-- Rename Modal -->
    <div class="modal fade" id="renameModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" data-i18n="web.recordings.rename_modal_title">Rename recording</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="renameInput" class="form-label" data-i18n="web.recordings.new_name">New name:</label>
                        <input type="text" class="form-control" id="renameInput">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="web.recordings.cancel">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="confirmRename()" data-i18n="web.recordings.rename">Rename</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" data-i18n="web.recordings.delete_modal_title">Confirm delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p data-i18n="web.recordings.delete_confirm">Are you sure you want to delete this recording?</p>
                    <p class="text-muted" id="deleteRecordingName"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" data-i18n="web.recordings.cancel">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="confirmDelete()" data-i18n="web.recordings.delete">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/vendor/bootstrap.bundle.min.js"></script>
    <script src="/api.js"></script>
    <script>
        let recordings = [];
        let currentRenameId = null;
        let currentDeleteId = null;
        const renameModal = new bootstrap.Modal(document.getElementById('renameModal'));
        const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));

        function formatDuration(durationUs) {
            const seconds = Math.floor(durationUs / 1000000);
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            if (hours > 0) {
                return `${hours}:${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }
            return `${minutes}:${String(secs).padStart(2, '0')}`;
        }

        function formatFileSize(bytes) {
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let size = bytes;
            let unitIndex = 0;
            
            while (size >= 1024 && unitIndex < units.length - 1) {
                size /= 1024;
                unitIndex++;
            }
            
            return `${size.toFixed(2)} ${units[unitIndex]}`;
        }

        function renderRecordings(filteredRecordings = null) {
            const list = document.getElementById('recordingsList');
            const recordingsToRender = filteredRecordings || recordings;
            
            if (recordingsToRender.length === 0) {
                list.innerHTML = `
                    <div class="col-12">
                        <div class="card">
                            <div class="card-body text-center py-5">
                                <i class="bi bi-inbox fs-1 text-muted"></i>
                                <p class="mt-3 text-muted">${escapeHtml(t('web.recordings.empty'))}</p>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            list.innerHTML = recordingsToRender.map(recording => {
                // Thumbnail HTML - mostrar placeholder se não houver thumbnail
                let thumbnailHtml = '<div class="recording-thumbnail-placeholder"><i class="bi bi-film fs-1"></i></div>';
                if (recording.thumbnailPath) {
                    const thumbnailUrl = `/api/v1/recordings/${encodeURIComponent(recording.id)}/thumbnail`;
                    thumbnailHtml = `<img src="${thumbnailUrl}" class="recording-thumbnail" alt="Thumbnail" onerror="this.onerror=null; this.outerHTML='<div class=\\'recording-thumbnail-placeholder\\'><i class=\\'bi bi-film fs-1\\'></i></div>'">`;
                }
                
                return `
                <div class="col-md-6 col-lg-4">
                    <div class="card recording-card h-100">
                        ${thumbnailHtml}
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(recording.filename)}</h5>
                            <div class="mb-2">
                                <small class="text-muted">
                                    <i class="bi bi-aspect-ratio"></i> ${recording.width}x${recording.height} @ ${recording.fps} fps
                                </small>
                            </div>
                            <div class="mb-2">
                                <small class="text-muted">
                                    <i class="bi bi-clock"></i> ${formatDuration(recording.duration)}
                                </small>
                            </div>
                            <div class="mb-3">
                                <small class="text-muted">
                                    <i class="bi bi-hdd"></i> ${formatFileSize(recording.fileSize)}
                                </small>
                            </div>
                            <div class="recording-actions">
                                <button class="btn btn-sm btn-primary" onclick="playRecording('${recording.id}')" title="${escapeHtml(t('web.recordings.play'))}">
                                    <i class="bi bi-play-fill"></i>
                                </button>
                                <button class="btn btn-sm btn-success" onclick="downloadRecording('${recording.id}', '${escapeHtml(recording.filename)}')" title="${escapeHtml(t('web.recordings.download'))}">
                                    <i class="bi bi-download"></i>
                                </button>
                                <button class="btn btn-sm btn-secondary" onclick="renameRecording('${recording.id}', '${escapeHtml(recording.filename)}')" title="${escapeHtml(t('web.recordings.rename'))}">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteRecording('${recording.id}', '${escapeHtml(recording.filename)}')" title="${escapeHtml(t('web.recordings.delete'))}">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                        <div class="card-footer text-muted">
                            <small><i class="bi bi-calendar"></i> ${recording.createdAt}</small>
                        </div>
                    </div>
                </div>
            `;
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function filterRecordings() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = recordings.filter(r => r.filename.toLowerCase().includes(searchTerm));
            renderRecordings(filtered);
        }

        async function refreshRecordings() {
            try {
                const response = await api.getRecordings();
                recordings = response.recordings || [];
                recordings.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                renderRecordings();
                showAlert(t('web.recordings.refresh_ok'), 'success');
            } catch (error) {
                console.error('Error loading recordings:', error);
                showAlert(t('web.recordings.refresh_fail') + ' ' + error.message, 'danger');
            }
        }

        function playRecording(id) {
            const videoUrl = `/api/v1/recordings/${encodeURIComponent(id)}/file`;
            const player = document.getElementById('videoPlayer');
            const container = document.getElementById('videoPlayerContainer');
            
            player.src = videoUrl;
            container.classList.add('active');
            player.play();
        }

        async function downloadRecording(id, filename) {
            try {
                const videoUrl = `/api/v1/recordings/${encodeURIComponent(id)}/file`;
                
                // Fetch the file
                const response = await fetch(videoUrl);
                if (!response.ok) {
                    throw new Error('Failed to download recording');
                }
                
                // Get the blob
                const blob = await response.blob();
                
                // Create download link
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                showAlert(t('web.recordings.download_started'), 'success');
            } catch (error) {
                console.error('Error downloading recording:', error);
                showAlert(t('web.recordings.download_fail') + ' ' + error.message, 'danger');
            }
        }

        function closeVideoPlayer() {
            const container = document.getElementById('videoPlayerContainer');
            const player = document.getElementById('videoPlayer');
            
            container.classList.remove('active');
            player.pause();
            player.src = '';
        }

        function renameRecording(id, currentName) {
            currentRenameId = id;
            document.getElementById('renameInput').value = currentName.replace(/\.[^/.]+$/, ''); // Remove extension
            renameModal.show();
        }

        async function confirmRename() {
            if (!currentRenameId) return;
            
            const newName = document.getElementById('renameInput').value.trim();
            if (!newName) {
                showAlert(t('web.recordings.name_empty'), 'warning');
                return;
            }

            try {
                await api.renameRecording(currentRenameId, newName);
                showAlert(t('web.recordings.rename_ok'), 'success');
                renameModal.hide();
                refreshRecordings();
            } catch (error) {
                console.error('Error renaming recording:', error);
                showAlert(t('web.recordings.rename_fail') + ' ' + error.message, 'danger');
            }
        }

        function deleteRecording(id, name) {
            currentDeleteId = id;
            document.getElementById('deleteRecordingName').textContent = name;
            deleteModal.show();
        }

        async function confirmDelete() {
            if (!currentDeleteId) return;

            try {
                await api.deleteRecording(currentDeleteId);
                showAlert(t('web.recordings.delete_ok'), 'success');
                deleteModal.hide();
                refreshRecordings();
            } catch (error) {
                console.error('Error deleting recording:', error);
                showAlert(t('web.recordings.delete_fail') + ' ' + error.message, 'danger');
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            container.appendChild(alert);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }

        // Close video player on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeVideoPlayer();
            }
        });

        // Função para navegar para a página inicial, forçando reload
        function goToHome(event) {
            event.preventDefault();
            // Usar replace para não adicionar ao histórico e forçar navegação
            window.location.replace('/');
        }

        // Load recordings on page load
        refreshRecordings();

        // Language dropdown wiring.
        (function () {
            const sel = document.getElementById('langSelect');
            if (!sel || !window.i18n) return;
            window.i18n.onReady(() => { sel.value = window.i18n.getLanguage(); });
            sel.addEventListener('change', () => {
                window.i18n.setLanguage(sel.value).then(() => {
                    // Re-render the recordings list so dynamic
                    // strings inside the cards pick up the new
                    // language (button titles, empty state, etc.).
                    renderRecordings();
                });
            });
        })();

        // Detectar quando a página é carregada do cache do histórico (back/forward cache)
        // e forçar reload se necessário para evitar mostrar conteúdo antigo
        window.addEventListener('pageshow', (event) => {
            // Se a página foi carregada do cache do histórico (back/forward cache)
            if (event.persisted) {
                // Se estamos na raiz mas deveríamos estar em recordings.html, recarregar
                if (window.location.pathname === '/' || window.location.pathname === '/index.html') {
                    // Se o título indica que estamos na página de gravações, recarregar
                    if (document.title.includes('Recordings')) {
                        window.location.reload();
                    }
                }
            }
        });
    </script>
    <script src="/sw-register.js"></script>
</body>
</html>
