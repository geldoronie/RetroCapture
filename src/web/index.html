<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RetroCapture — live stream of your retro capture with shaders applied.">
    <meta name="theme-color" content="#0A7A83">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RetroCapture">

    <title>RetroCapture · Live</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icon-192x192.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512x512.png">

    <!-- Bootstrap 5 CSS (vendored locally for offline-first PWA) -->
    <link href="/vendor/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (vendored locally) -->
    <link rel="stylesheet" href="/vendor/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/style.css">
</head>
<body class="home-page">
    <!-- Top navigation (shared across pages) -->
    <header class="portal-nav">
        <div class="container-fluid px-3 px-md-4">
            <div class="d-flex align-items-center justify-content-between">
                <a href="/" class="portal-brand text-decoration-none d-flex align-items-center">
                    <i class="bi bi-controller fs-3 me-2"></i>
                    <span class="fw-semibold">RetroCapture</span>
                </a>
                <nav class="portal-nav-links d-flex">
                    <a href="/" class="portal-nav-link active"><i class="bi bi-broadcast me-1"></i><span class="d-none d-sm-inline">Live</span></a>
                    <a href="/recordings.html" class="portal-nav-link"><i class="bi bi-camera-video me-1"></i><span class="d-none d-sm-inline">Recordings</span></a>
                    <a href="/config.html" class="portal-nav-link"><i class="bi bi-gear me-1"></i><span class="d-none d-sm-inline">Configuration</span></a>
                </nav>
                <div class="d-flex align-items-center gap-1">
                    <button class="btn btn-sm btn-outline-light" onclick="copyStreamUrl()" title="Copy stream URL">
                        <i class="bi bi-clipboard"></i>
                    </button>
                    <a id="streamLink" href="/stream" target="_blank" class="btn btn-sm btn-outline-light" title="Open stream in new tab">
                        <i class="bi bi-box-arrow-up-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Alert Container -->
    <div class="alert-container" id="alertContainer"></div>

    <!-- Hero: live player -->
    <section class="home-hero">
        <div class="container-fluid px-3 px-md-4 py-3">
            <div class="home-player-wrapper">
                <video id="livePlayer" controls autoplay muted playsinline class="home-player"></video>
                <div class="home-player-overlay" id="livePlayerIdleOverlay">
                    <div class="text-center">
                        <i class="bi bi-broadcast display-3 text-light opacity-50 mb-3 d-block"></i>
                        <h3 class="text-light">Stream is offline</h3>
                        <p class="text-light opacity-75 mb-3">Start streaming from the Configuration page or click Play to try anyway.</p>
                        <button class="btn btn-primary" id="livePlayerStartBtn"><i class="bi bi-play-fill me-1"></i>Play</button>
                    </div>
                </div>
                <div class="home-player-controls" id="livePlayerControls">
                    <button class="btn btn-sm btn-outline-light" id="livePlayerStopBtn" disabled><i class="bi bi-stop-fill me-1"></i>Stop</button>
                    <span class="text-light small ms-2" id="livePlayerStatus">Ready.</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Below player: status + quick actions -->
    <main class="home-main">
        <div class="container-fluid px-3 px-md-4">
            <div class="row g-3">
                <!-- Live status row -->
                <div class="col-12">
                    <div class="card">
                        <div class="card-body py-2">
                            <div class="row g-2 text-center">
                                <div class="col-6 col-md-3">
                                    <div class="home-stat">
                                        <div class="home-stat-label">Streaming</div>
                                        <div class="home-stat-value" id="homeStreamStatus">—</div>
                                    </div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <div class="home-stat">
                                        <div class="home-stat-label">Viewers</div>
                                        <div class="home-stat-value" id="homeClientCount">0</div>
                                    </div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <div class="home-stat">
                                        <div class="home-stat-label">Resolution</div>
                                        <div class="home-stat-value" id="homeResolution">—</div>
                                    </div>
                                </div>
                                <div class="col-6 col-md-3">
                                    <div class="home-stat">
                                        <div class="home-stat-label">FPS</div>
                                        <div class="home-stat-value" id="homeFps">—</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Now playing — read-only info about what's on the live stream. -->
                <div class="col-12">
                    <div class="card">
                        <div class="card-body">
                            <h6 class="card-title text-uppercase text-muted small mb-3"><i class="bi bi-palette me-1"></i>Now playing</h6>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <div class="text-muted small">Source</div>
                                    <div id="homeSource" class="fw-semibold">—</div>
                                </div>
                                <div class="col-md-6">
                                    <div class="text-muted small">Shader</div>
                                    <div id="homeShader" class="fw-semibold">—</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/api.js"></script>
    <script src="/vendor/bootstrap.bundle.min.js"></script>
    <script src="/vendor/mpegts.min.js"></script>
    <script src="/home.js"></script>

    <!-- Service Worker registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
