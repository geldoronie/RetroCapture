# Orchestration for everything under platform/.
#
# Build contexts point into each subtree so the Dockerfiles continue
# to live alongside their service. Spinning up the whole stack:
#
#   cd platform && docker compose up
#
# Spinning up a single service:
#
#   cd platform && docker compose up directory
#
# Running a service's test suite (one-shot, doesn't stay up):
#
#   cd platform && docker compose --profile test run --rm directory-test
#
# Future services / frontends are added as new top-level entries here.

services:
  directory:
    build:
      context: ./services/directory
      target: runtime
    image: retrocapture-directory:dev
    container_name: retrocapture-directory
    ports:
      - "8081:8081"
    volumes:
      - ./services/directory/data:/data
    environment:
      DIRECTORY_PORT: "8081"
      DIRECTORY_DB_PATH: "/data/directory.db"
      DIRECTORY_LOG_LEVEL: "debug"
      DIRECTORY_TTL_SECONDS: "120"
      # When the directory is deployed behind a reverse proxy (FRP,
      # nginx, Cloudflare), set this to "true" so the recorded
      # publicIp / reporter_ip is the real client, not the proxy.
      # Off by default in the compose example because plain
      # `docker compose up` exposes 8081 directly on the host.
      DIRECTORY_TRUST_PROXY_HEADERS: "false"
    restart: unless-stopped
    # No container-side healthcheck: the runtime image is FROM scratch
    # and has no shell / curl to probe with. Liveness is the
    # orchestrator's job in production; `curl localhost:8081/health`
    # from the host is enough for local dev.

  directory-test:
    build:
      context: ./services/directory
      target: test
    image: retrocapture-directory:test
    profiles: ["test"]
    # The test stage's RUN already executed `go test ./...`; if it
    # passed, the image built — there's nothing left to do at run time.
    command: ["true"]

  chat:
    build:
      context: ./services/chat
      target: runtime
    image: retrocapture-chat:dev
    container_name: retrocapture-chat
    ports:
      - "8082:8082"
    volumes:
      - ./services/chat/data:/data
    environment:
      CHAT_PORT: "8082"
      CHAT_DB_PATH: "/data/chat.db"
      CHAT_LOG_LEVEL: "debug"
      # Same reverse-proxy story as directory: flip on when deployed
      # behind FRP / nginx / Cloudflare so the real client IP gets
      # used for per-IP rate limiting instead of the proxy's.
      CHAT_TRUST_PROXY_HEADERS: "false"
    restart: unless-stopped

  chat-test:
    build:
      context: ./services/chat
      target: test
    image: retrocapture-chat:test
    profiles: ["test"]
    command: ["true"]
