# Local development orchestration for the directory service.
#
# Usage:
#   docker compose up --build           # run the service
#   docker compose run --rm test        # run the test suite once
#   docker compose down                 # stop
#   rm -rf data/                        # nuke local state
#
# The service binds to :8081 on the host. Data is persisted to ./data/
# in this directory so the SQLite database survives `docker compose
# down`.

services:
  directory:
    build:
      context: .
      target: runtime
    image: retrocapture-directory:dev
    container_name: retrocapture-directory
    ports:
      - "8081:8081"
    volumes:
      - ./data:/data
    environment:
      DIRECTORY_PORT: "8081"
      DIRECTORY_DB_PATH: "/data/directory.db"
      DIRECTORY_LOG_LEVEL: "debug"
      DIRECTORY_TTL_SECONDS: "120"
    restart: unless-stopped
    # No container-side healthcheck: the runtime image is FROM scratch
    # and has no shell / curl to probe with. Liveness probing is the
    # orchestrator's job in production; `curl localhost:8081/health`
    # from the host is enough for local dev.

  # Run the Go test suite end-to-end inside the same toolchain image
  # used for the production build. Invoked as:
  #   docker compose run --rm test
  test:
    build:
      context: .
      target: test
    image: retrocapture-directory:test
    profiles: ["test"]
    command: ["true"]    # the RUN in the test stage already executed all tests
